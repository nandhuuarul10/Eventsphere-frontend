<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSphere - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <h1>EventSphere</h1>
                <p>Create your account to get started</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="userName">Username</label>
                    <input type="text" id="userName" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Choose a password">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" required>
                        <option value="USER">Standard User</option>
                        <option value="ADMIN">Administrator</option>
                    </select>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (localStorage.getItem("token")) {
            window.location.href = "dashboard.html";
        }

        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const userName = document.getElementById("userName").value;
            const email = document.getElementById("email").value;
            const passWord = document.getElementById("password").value;
            const role = document.getElementById("role").value;

            try {
                await apiRequest("/auth/register", "POST", { userName, email, passWord, role });
                showToast("Registration Successful! Please Login.");
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);
            } catch (err) {
                showToast(err.message, "error");
            }
        });
    </script>
</body>
</html>
